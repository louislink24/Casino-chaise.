<script>
let money = 100;
const startMoney = 100;

const symbols = ["🍒","🍋","🔔","💎","7️⃣","6️⃣"];

const reelsDiv = document.getElementById("reels");
const moneyDiv = document.getElementById("money");
const gameOverScreen = document.getElementById("gameOverScreen");

function updateMoney() {
    moneyDiv.textContent = "💰 Argent : " + money + "€";

    if (money <= 0) {
        gameOverScreen.style.display = "flex";
    }
}

function restart() {
    money = startMoney;
    gameOverScreen.style.display = "none";
    reelsDiv.textContent = "🎲 🎲 🎲";
    updateMoney();
}

function spin(bet) {
    if (money <= 0) return;

    bet = Math.min(bet, money);
    money -= bet;

    // 🎲 résultat instantané
    const result = [
        symbols[Math.floor(Math.random() * symbols.length)],
        symbols[Math.floor(Math.random() * symbols.length)],
        symbols[Math.floor(Math.random() * symbols.length)]
    ];

    reelsDiv.textContent = result.join(" ");

    // 💀 logique de gain/perte
    if (result[0] === result[1] && result[1] === result[2]) {

        if (result[0] === "7️⃣") {
            money += bet * 10;
        } else if (result[0] === "💎") {
            money += bet * 7;
        } else {
            money += bet * 5;
        }

    } else if (
        result[0] === result[1] ||
        result[1] === result[2] ||
        result[0] === result[2]
    ) {
        money += bet * 2;
    }

    updateMoney();
}

updateMoney();
        </script>
